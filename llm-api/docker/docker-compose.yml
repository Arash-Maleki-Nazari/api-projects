version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: llm-api-postgres
    environment:
      POSTGRES_USER: labeling_user
      POSTGRES_PASSWORD: labeling_password
      POSTGRES_DB: labeling_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labeling_user -d labeling_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llm-api-network

  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: llm-api-app
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      DATABASE_URL: postgresql://labeling_user:labeling_password@postgres:5432/labeling_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      API_KEY_SECRET: ${API_KEY_SECRET}
      RATE_LIMIT_PER_MINUTE: 100
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - llm-api-network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # Optional: Redis for caching (for future optimization)
  # redis:
  #   image: redis:7-alpine
  #   container_name: llm-api-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - llm-api-network

volumes:
  postgres_data:
  # redis_data:

networks:
  llm-api-network:
    driver: bridge
